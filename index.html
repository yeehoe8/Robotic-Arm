<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-DOF Industrial HMI Pendant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        :root { --bg-main: #0b0f19; --bg-panel: #131c31; --bg-card: #1e293b; --border-color: #334155; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-cyan: #0ea5e9; --accent-cyan-hover: #38bdf8; --accent-orange: #f59e0b; --accent-green: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }
        #sidebar { width: 380px; background-color: var(--bg-panel); border-right: 1px solid var(--border-color); padding: 25px; box-shadow: 4px 0 15px rgba(0,0,0,0.3); overflow-y: auto; z-index: 5; display: flex; flex-direction: column; gap: 20px; }
        #sidebar::-webkit-scrollbar { width: 8px; } #sidebar::-webkit-scrollbar-track { background: var(--bg-panel); } #sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        h2 { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--accent-cyan); padding-bottom: 10px; margin: 0 0 5px 0; color: #fff; }
        h3 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 15px 0; color: var(--text-muted); }
        .slider-group { background: var(--bg-card); padding: 18px; border-radius: 12px; border: 1px solid var(--border-color); transition: border-color 0.3s; }
        .slider-group:hover { border-color: #475569; }
        .panel-highlight { border-top: 3px solid var(--accent-cyan); }
        .panel-hardware { border-top: 3px solid var(--accent-green); }
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: 600; font-size: 0.95rem; }
        input[type=range] { appearance: none; -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #0f172a; border-radius: 3px; border: 1px solid #334155; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-cyan); margin-top: -6px; box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); transition: transform 0.1s; }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); background: #fff; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        input[type=text], input[type=number] { width: 100%; padding: 10px; background: #0f172a; border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; transition: outline 0.2s; }
        input[type=text]:focus, input[type=number]:focus { outline: 2px solid var(--accent-cyan); border-color: transparent; }
        .joint-input { width: 65px !important; padding: 4px 8px !important; background: rgba(15, 23, 42, 0.5) !important; color: var(--accent-cyan) !important; border: 1px solid var(--border-color) !important; text-align: right; border-radius: 4px; }
        .joint-input::-webkit-outer-spin-button, .joint-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .ik-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .ik-inputs label { display: flex; flex-direction: column; font-size: 0.8rem; color: var(--text-muted); gap: 5px; }
        button { background: linear-gradient(135deg, var(--accent-cyan), #0284c7); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { background: linear-gradient(135deg, var(--accent-cyan-hover), var(--accent-cyan)); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(14, 165, 233, 0.3); }
        button:active { transform: translateY(0); }
        button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-home { background: linear-gradient(135deg, var(--accent-orange), #d97706); }
        .btn-home:hover { background: linear-gradient(135deg, #fbbf24, var(--accent-orange)); box-shadow: 0 6px 12px rgba(245, 158, 11, 0.3); }
        .btn-hardware { background: linear-gradient(135deg, var(--accent-green), #059669); }
        .btn-hardware:hover { background: linear-gradient(135deg, #34d399, var(--accent-green)); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3); }
        #plot-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: var(--bg-main); outline: none; }
        .data-readout { position: absolute; top: 25px; right: 25px; background: rgba(15, 23, 42, 0.75); padding: 20px 25px; border-radius: 12px; border: 1px solid rgba(14, 165, 233, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.5); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--text-muted); z-index: 10; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); width: 220px; }
        .data-readout strong { color: #fff; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; display: block; }
        .data-readout span { color: var(--accent-cyan); font-weight: 700; float: right; text-align: right; }
        .coord-line { margin-bottom: 8px; clear: both; }
        .telemetry-divider { height: 1px; background: var(--border-color); margin: 15px 0; }
        .telemetry-status { color: var(--accent-green) !important; }
        .telemetry-warning { color: var(--accent-orange) !important; }
        .bt-floating-status { position: absolute; bottom: 25px; right: 25px; background: rgba(15, 23, 42, 0.65); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.5); font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--text-main); z-index: 10; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; gap: 12px; }
        .bt-indicator-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); transition: background 0.3s, box-shadow 0.3s; }
        canvas { display: block; outline: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Control Panel</h2>
        
        <div class="slider-group panel-hardware">
            <h3 style="color: var(--accent-green);">12-Bit Hardware Link</h3>
            <div class="flex-row">
                <input type="text" id="comPort" value="COM8" placeholder="COM Port">
                <button onclick="connectSerial()" class="btn-hardware">Connect</button>
            </div>
        </div>

        <button id="homeBtn" class="btn-home" onclick="goHome()">Home Position</button>
        
        <div id="slidersContainer">
            <script>
                const customLimits = [
                    { min: -90, max: 90 },    
                    { min: -60, max: 60 },    
                    { min: -55, max: 19 },    
                    { min: -135, max: 135 },  
                    { min: -90, max: 90 },    
                    { min: -90, max: 90 }     
                ];
                
                for (let i = 1; i <= 6; i++) {
                    document.write(`
                        <div class="slider-group">
                            <div class="slider-header">
                                <span style="color: #cbd5e1;">Joint ${i} <span style="color:var(--text-muted); font-size:0.8em;">(&theta;${i})</span></span>
                                <div style="display: flex; align-items: center; gap: 4px;">
                                    <input type="number" id="num${i}" class="joint-input" min="${customLimits[i-1].min}" max="${customLimits[i-1].max}" step="0.1" value="0.0" onchange="syncFromInput(${i})" onkeyup="if(event.key === 'Enter') syncFromInput(${i})">
                                    <span style="color:var(--accent-cyan); font-family:'JetBrains Mono', monospace;">&deg;</span>
                                </div>
                            </div>
                            <input type="range" id="q${i}" min="${customLimits[i-1].min}" max="${customLimits[i-1].max}" step="0.1" value="0" oninput="updateRobot()">
                        </div>
                    `);
                }
            </script>
        </div>

        <div class="slider-group panel-highlight">
            <h3 style="color: var(--accent-cyan);">Target Coordinate (IK)</h3>
            <div class="ik-inputs">
                <label>X-Axis <input type="number" id="targetX"></label>
                <label>Y-Axis <input type="number" id="targetY"></label>
                <label>Z-Axis <input type="number" id="targetZ"></label>
            </div>
            <button id="moveBtn" onclick="goToCoordinate()">Execute Path</button>
        </div>
    </div>

    <div id="plot-container">
        <div class="data-readout">
            <strong>TCP Real-time</strong>
            <div class="coord-line">X-Axis: <span id="outX">0.00</span></div>
            <div class="coord-line">Y-Axis: <span id="outY">0.00</span></div>
            <div class="coord-line">Z-Axis: <span id="outZ">0.00</span></div>
            
            <div class="telemetry-divider"></div>
            
            <strong>Solver Diagnostics</strong>
            <div class="coord-line">Math Engine: <span style="color: #cbd5e1;">Jacobian DLS</span></div>
            <div class="coord-line">Phase Mode: <span id="telemetryMode" style="color: #cbd5e1;">Standby</span></div>
            <div class="coord-line">Calc Error: <span id="telemetryError" class="telemetry-status">0.00 mm</span></div>
        </div>

        <div class="bt-floating-status">
            <div class="bt-indicator-dot" id="btIndicator"></div>
            <span id="btText" style="font-weight: 600;">Disconnected</span>
        </div>
    </div>

    <script>
        // --- THREE.JS SCENE SETUP ---
        const container = document.getElementById('plot-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0b0f19'); 
        
        const gridHelper = new THREE.GridHelper(1200, 24, 0x1e293b, 0x1e293b);
        scene.add(gridHelper);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(500, 1000, 500);
        scene.add(directionalLight);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 3000);
        camera.position.set(500, 400, 600); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 200, 0);

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- MATERIALS & OBJECTS ---
        const matGray = new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.8 }); 
        const matSilver = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, metalness: 0.9, roughness: 0.2 }); 
        const matNode = new THREE.MeshStandardMaterial({ color: 0x0ea5e9 }); 

        let linkCylinders = [];
        let jointNodes = [];

        // --- TRAJECTORY PATH TRACING SETUP ---
        const pathPoints = []; 
        const pathMaterial = new THREE.LineBasicMaterial({
            color: 0xf59e0b, 
            linewidth: 3,
            transparent: true,
            opacity: 0.85
        });
        const pathGeometry = new THREE.BufferGeometry();
        const pathLine = new THREE.Line(pathGeometry, pathMaterial);
        scene.add(pathLine);

        // --- USB / SERIAL ---
        async function connectSerial() {
            let port = document.getElementById('comPort').value;
            let statusText = document.getElementById('btText');
            let indicator = document.getElementById('btIndicator');
            
            statusText.innerText = "Connecting...";
            indicator.style.background = "#f59e0b";
            indicator.style.boxShadow = "0 0 8px #f59e0b";

            try {
                const response = await fetch(`http://127.0.0.1:8000/connect_serial?port=${port}`);
                const data = await response.json();

                if (data.status === "success") {
                    statusText.innerText = `Connected via USB`;
                    indicator.style.background = "#10b981"; 
                    indicator.style.boxShadow = "0 0 8px #10b981";
                } else {
                    statusText.innerText = `Error`;
                    indicator.style.background = "#ef4444"; 
                    indicator.style.boxShadow = "0 0 8px #ef4444";
                }
            } catch (error) {
                statusText.innerText = "Failed";
                indicator.style.background = "#ef4444";
                indicator.style.boxShadow = "0 0 8px #ef4444";
            }
        }

        let lastSendTime = 0;
        let pendingHardwareUpdate = null;

        function pushToHardware(q) {
            let now = Date.now();
            // Pushing at 30 FPS interval (approx 33ms)
            if (now - lastSendTime > 30) {
                lastSendTime = now;
                fetch(`http://127.0.0.1:8000/set_hardware?q1=${q[0]}&q2=${q[1]}&q3=${q[2]}&q4=${q[3]}&q5=${q[4]}&q6=${q[5]}`)
                    .catch(e => console.error("Hardware push failed:", e));
            } else {
                clearTimeout(pendingHardwareUpdate);
                pendingHardwareUpdate = setTimeout(() => {
                    lastSendTime = Date.now();
                    fetch(`http://127.0.0.1:8000/set_hardware?q1=${q[0]}&q2=${q[1]}&q3=${q[2]}&q4=${q[3]}&q5=${q[4]}&q6=${q[5]}`)
                        .catch(e => console.error("Hardware push failed:", e));
                }, 30);
            }
        }

        function syncFromInput(i) {
            let numInput = document.getElementById(`num${i}`);
            let slider = document.getElementById(`q${i}`);
            let val = parseFloat(numInput.value);
            
            let min = parseFloat(numInput.min);
            let max = parseFloat(numInput.max);
            if (val < min) val = min;
            if (val > max) val = max;
            
            numInput.value = val.toFixed(1);
            slider.value = val;
            
            updateRobot();
        }

        async function updateRobot() {
            let q = [];
            for (let i = 1; i <= 6; i++) {
                let val = document.getElementById(`q${i}`).value;
                if(document.activeElement !== document.getElementById(`num${i}`)) {
                    document.getElementById(`num${i}`).value = parseFloat(val).toFixed(1);
                }
                q.push(val);
            }

            pushToHardware(q); 

            try {
                const response = await fetch(`http://127.0.0.1:8000/kinematics?q1=${q[0]}&q2=${q[1]}&q3=${q[2]}&q4=${q[3]}&q5=${q[4]}&q6=${q[5]}`);
                const data = await response.json();

                if (data.status === "success") {
                    renderArm(data.joints);

                    let endEffector = data.joints[data.joints.length - 1];
                    if (document.activeElement !== document.getElementById('targetX')) document.getElementById('targetX').value = Math.round(endEffector[0]);
                    if (document.activeElement !== document.getElementById('targetY')) document.getElementById('targetY').value = Math.round(endEffector[1]);
                    if (document.activeElement !== document.getElementById('targetZ')) document.getElementById('targetZ').value = Math.round(endEffector[2]);
                }
            } catch (error) {
                console.error("Server communication failure:", error);
            }
        }

        // --- RENDER ARM & DRAW PATH ---
        function renderArm(joints) {
            function updateCylinder(cylinder, pointA, pointB) {
                const dir = new THREE.Vector3().subVectors(pointB, pointA);
                const length = dir.length();
                if(length === 0) return; 
                
                cylinder.scale.set(1, length, 1);
                cylinder.position.copy(pointA).add(dir.clone().multiplyScalar(0.5));
                cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
            }

            for (let i = 0; i < joints.length; i++) {
                let pt = new THREE.Vector3(joints[i][0], joints[i][2], -joints[i][1]); 

                if (!jointNodes[i]) {
                    let geom = new THREE.SphereGeometry(12, 16, 16);
                    let mat = matNode;
                    let mesh = new THREE.Mesh(geom, mat);
                    scene.add(mesh);
                    jointNodes[i] = mesh;
                }
                jointNodes[i].position.copy(pt);

                if (i < joints.length - 1) {
                    let nextPt = new THREE.Vector3(joints[i+1][0], joints[i+1][2], -joints[i+1][1]);
                    
                    if (!linkCylinders[i]) {
                        const cylGeom = new THREE.CylinderGeometry(15, 15, 1, 32);
                        let activeMat = matGray;
                        if (i === 3) activeMat = matSilver; 
                        if (i === 5) cylGeom.scale(0.5, 1, 0.5); 
                        
                        let mesh = new THREE.Mesh(cylGeom, activeMat);
                        scene.add(mesh);
                        linkCylinders[i] = mesh;
                    }
                    updateCylinder(linkCylinders[i], pt, nextPt);
                }
            }

            // --- TRACE THE END EFFECTOR PATH ---
            let endEffector = joints[joints.length - 1];
            let currentPos = new THREE.Vector3(endEffector[0], endEffector[2], -endEffector[1]);
            
            pathPoints.push(currentPos);
            if (pathPoints.length > 300) {
                pathPoints.shift();
            }
            pathGeometry.setFromPoints(pathPoints);

            document.getElementById('outX').innerText = endEffector[0].toFixed(2);
            document.getElementById('outY').innerText = endEffector[1].toFixed(2);
            document.getElementById('outZ').innerText = endEffector[2].toFixed(2);
        }

        // --- SAFE-ARC HOMING (Python Engine) ---
        async function goHome() {
            const btnHome = document.getElementById('homeBtn');
            const btnMove = document.getElementById('moveBtn');
            const telMode = document.getElementById('telemetryMode');
            const telError = document.getElementById('telemetryError');
            
            btnHome.disabled = true;
            btnMove.disabled = true;
            telMode.innerText = "Calculating Home...";
            telMode.style.color = "#f59e0b"; // Orange while thinking

            pathPoints.length = 0;
            pathGeometry.setFromPoints(pathPoints);

            let cur = [];
            for (let i = 1; i <= 6; i++) cur.push(document.getElementById(`q${i}`).value);
            
            let currentX = parseFloat(document.getElementById('outX').innerText);
            let currentY = parseFloat(document.getElementById('outY').innerText);
            let currentZ = parseFloat(document.getElementById('outZ').innerText);

            try {
                // Call Python server using the new "safe_home" mode
                const response = await fetch(`http://127.0.0.1:8000/inverse_kinematics?x=${currentX}&y=${currentY}&z=${currentZ}&cur1=${cur[0]}&cur2=${cur[1]}&cur3=${cur[2]}&cur4=${cur[3]}&cur5=${cur[4]}&cur6=${cur[5]}&mode=safe_home`);
                const data = await response.json();

                if (data.status === "success" || data.status === "warning") {
                    
                    telMode.innerText = "Executing Home";
                    telMode.style.color = "#10b981"; // Green while moving
                    telError.innerText = "0.00 mm"; // Home is always exact
                    telError.className = "telemetry-status";

                    let frames = data.frames;
                    let currentFrame = 0;

                    function playNextFrame() {
                        if (currentFrame >= frames.length) {
                            btnHome.disabled = false;
                            btnMove.disabled = false;
                            telMode.innerText = "Standby";
                            telMode.style.color = "#cbd5e1";
                            return;
                        }

                        let frame = frames[currentFrame];

                        // Play the frame simultaneously to the UI and hardware
                        for (let i = 1; i <= 6; i++) {
                            document.getElementById(`q${i}`).value = frame.angles[i-1];
                            document.getElementById(`num${i}`).value = parseFloat(frame.angles[i-1]).toFixed(1);
                        }

                        renderArm(frame.joints);
                        pushToHardware(frame.angles);

                        currentFrame++;
                        setTimeout(playNextFrame, 33); // Enforce strict 30 FPS playback
                    }
                    playNextFrame(); 
                } else {
                    console.warn("Homing failed on server side.");
                    telMode.innerText = "Failed";
                    telMode.style.color = "#ef4444";
                    btnHome.disabled = false;
                    btnMove.disabled = false;
                }
            } catch (error) {
                console.error("Homing engine link failure:", error);
                telMode.innerText = "Server Timeout";
                telMode.style.color = "#ef4444";
                btnHome.disabled = false;
                btnMove.disabled = false;
            }
        }

        // --- IK SEQUENCE (JACOBIAN EXECUTION) ---
        async function goToCoordinate() {
            const btnHome = document.getElementById('homeBtn');
            const btnMove = document.getElementById('moveBtn');
            const telMode = document.getElementById('telemetryMode');
            const telError = document.getElementById('telemetryError');
            
            btnHome.disabled = true; 
            btnMove.disabled = true;
            telMode.innerText = "Calculating DLS...";
            telMode.style.color = "#f59e0b"; // Orange while thinking
            
            pathPoints.length = 0;
            pathGeometry.setFromPoints(pathPoints);

            let cur = [];
            for (let i = 1; i <= 6; i++) cur.push(document.getElementById(`q${i}`).value);

            let x = document.getElementById('targetX').value;
            let y = document.getElementById('targetY').value;
            let z = document.getElementById('targetZ').value;

            try {
                // Call Python Advanced Jacobian Solver
                const response = await fetch(`http://127.0.0.1:8000/inverse_kinematics?x=${x}&y=${y}&z=${z}&cur1=${cur[0]}&cur2=${cur[1]}&cur3=${cur[2]}&cur4=${cur[3]}&cur5=${cur[4]}&cur6=${cur[5]}&mode=auto_plunge`);
                const data = await response.json();

                if (data.status === "success" || data.status === "warning") {
                    
                    // Update the Telemetry UI
                    telMode.innerText = "Executing Staple";
                    telMode.style.color = "#10b981"; // Green while executing
                    
                    telError.innerText = data.error_mm.toFixed(2) + " mm";
                    telError.className = data.error_mm <= 5.0 ? "telemetry-status" : "telemetry-warning";

                    let frames = data.frames;
                    let currentFrame = 0;

                    function playNextFrame() {
                        if (currentFrame >= frames.length) {
                            btnHome.disabled = false;
                            btnMove.disabled = false;
                            telMode.innerText = "Target Reached";
                            telMode.style.color = "#cbd5e1";
                            return;
                        }

                        let frame = frames[currentFrame];

                        for (let i = 1; i <= 6; i++) {
                            document.getElementById(`q${i}`).value = frame.angles[i-1];
                            document.getElementById(`num${i}`).value = parseFloat(frame.angles[i-1]).toFixed(1);
                        }

                        renderArm(frame.joints);
                        pushToHardware(frame.angles);

                        currentFrame++;
                        setTimeout(playNextFrame, 33); 
                    }
                    playNextFrame(); 
                    
                } else {
                    alert("Unreachable coordinate! Mathematical Singularity or Workspace Limit Hit.");
                    telMode.innerText = "Failed: Singularity";
                    telMode.style.color = "#ef4444";
                    btnHome.disabled = false;
                    btnMove.disabled = false;
                }
            } catch (error) {
                console.error("IK trajectory engine link failure:", error);
                telMode.innerText = "Server Timeout";
                telMode.style.color = "#ef4444";
                btnHome.disabled = false;
                btnMove.disabled = false;
            }
        }

        updateRobot();
    </script>
</body> 
</html>
